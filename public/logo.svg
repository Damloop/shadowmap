<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#6a4dff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6a4dff" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6a4dff" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Glow exterior -->
  <circle cx="90" cy="90" r="78" fill="url(#glow)" opacity="0.35"/>

  <!-- Círculo principal -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="#c3b8ff" stroke-width="3" filter="url(#shadow)"/>

  <!-- Triángulo paranormal -->
  <path d="M90 42 L128 122 L52 122 Z"
        fill="none"
        stroke="#8f7bff"
        stroke-width="3"
        filter="url(#shadow)"/>

  <!-- Punto central -->
  <circle cx="90" cy="90" r="6" fill="#c3b8ff" filter="url(#shadow)"/>
</svg>
